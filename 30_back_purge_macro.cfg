
[gcode_macro DK_PRINT_START_LINE]
gcode:
    {% set target_temp = params.TARGET_TEMP | default(250) | int %}

    G90
    {% if printer.toolhead.extruder == 'extruder' %}
        MOVE_TO_XY_IDLE_POSITION_EXTRUDER X_OFFSET=-37 Y_OFFSET=22 {rawparams} # increasing Y moves the line near the parking position
    {% else %}
        MOVE_TO_XY_IDLE_POSITION_EXTRUDER X_OFFSET=-22 Y_OFFSET=22 {rawparams} # increasing Y moves the line near the parking position
    {% endif %}
    G0 Z2 F18000
    M109 S{target_temp}
    G1 Z0.2
    G91
    M83
    G1 X60 E15 F360
    G0 E-0.5
    G90
    G1 Z3

[gcode_macro SM_PRINT_START_LINE_EXTRUDER_0]
variable_has_finished: False
gcode:
    {% if has_finished == False %}
        T0 A0
        DK_PRINT_START_LINE TARGET_TEMP={params.TARGET_TEMP}
        SET_GCODE_VARIABLE MACRO=SM_PRINT_START_LINE_EXTRUDER_0 VARIABLE=has_finished VALUE=True
    {% endif %}

